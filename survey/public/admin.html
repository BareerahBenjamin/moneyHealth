<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>问卷数据 — 管理后台</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: #f5f0e8; color: #3d3529;
      min-height: 100vh; padding: 2rem 1.5rem;
    }
    .container { max-width: 1000px; margin: 0 auto; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .header h1 { font-size: 1.6rem; font-weight: 900; }
    .header h1 span { color: #8b7355; }
    .header-actions { display: flex; gap: 0.5rem; }
    .btn {
      padding: 0.6rem 1.2rem; background: #ffffff; border: 1px solid rgba(139,115,85,0.15);
      border-radius: 10px; color: #3d3529; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; transition: all 0.2s;
      box-shadow: 0 1px 4px rgba(139,115,85,0.06);
    }
    .btn:hover { border-color: #8b7355; color: #8b7355; }
    .btn-export { background: rgba(143,174,139,0.1); border-color: rgba(143,174,139,0.3); color: #6b8f67; }
    .btn-export:hover { background: rgba(143,174,139,0.2); border-color: #8fae8b; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: #ffffff; border-radius: 14px; padding: 1.2rem;
      border: 1px solid rgba(139,115,85,0.08); text-align: center;
      box-shadow: 0 2px 8px rgba(139,115,85,0.06);
    }
    .stat-num { font-size: 2rem; font-weight: 900; color: #8b7355; }
    .stat-label { font-size: 0.8rem; color: #8a8275; margin-top: 0.2rem; }

    .dist-section {
      background: #ffffff; border-radius: 14px; padding: 1.5rem;
      border: 1px solid rgba(139,115,85,0.08); margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(139,115,85,0.06);
    }
    .dist-section h2 { font-size: 1rem; margin-bottom: 1rem; color: #8a8275; }
    .dist-bar-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.6rem; }
    .dist-emoji { font-size: 1.3rem; width: 30px; text-align: center; }
    .dist-name { font-size: 0.85rem; width: 100px; flex-shrink: 0; }
    .dist-bar-bg {
      flex: 1; height: 24px; background: rgba(139,115,85,0.06);
      border-radius: 6px; overflow: hidden;
    }
    .dist-bar-fill {
      height: 100%; border-radius: 6px; transition: width 1s ease;
      display: flex; align-items: center; padding-left: 8px;
      font-size: 0.75rem; font-weight: 700; color: #3d3529; min-width: 30px;
    }
    .dist-count { font-size: 0.85rem; color: #8a8275; width: 40px; text-align: right; }

    .table-section {
      background: #ffffff; border-radius: 14px; padding: 1.5rem;
      border: 1px solid rgba(139,115,85,0.08);
      box-shadow: 0 2px 8px rgba(139,115,85,0.06);
    }
    .table-section h2 { font-size: 1rem; margin-bottom: 1rem; color: #8a8275; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      text-align: left; padding: 0.8rem 1rem; color: #8a8275;
      border-bottom: 1px solid rgba(139,115,85,0.1); font-weight: 600;
      white-space: nowrap;
    }
    td {
      padding: 0.8rem 1rem; border-bottom: 1px solid rgba(139,115,85,0.06);
      vertical-align: top;
    }
    tr:hover td { background: rgba(139,115,85,0.03); }
    .type-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.2rem 0.6rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
    }
    .link-btn {
      color: #7a8fa0; text-decoration: none; font-size: 0.8rem;
      border: 1px solid rgba(122,143,160,0.3); padding: 0.2rem 0.5rem;
      border-radius: 6px; transition: all 0.2s; white-space: nowrap;
    }
    .link-btn:hover { background: rgba(122,143,160,0.08); }
    .time-cell { color: #8a8275; white-space: nowrap; font-size: 0.8rem; }

    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 0.5rem; margin-top: 1.5rem;
    }
    .page-btn {
      padding: 0.5rem 1rem; background: #ffffff; border: 1px solid rgba(139,115,85,0.15);
      border-radius: 8px; color: #3d3529; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; transition: all 0.2s;
      box-shadow: 0 1px 4px rgba(139,115,85,0.06);
    }
    .page-btn:hover { border-color: #8b7355; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-btn.active { background: #8b7355; color: #fff; border-color: #8b7355; font-weight: 700; }

    .empty { text-align: center; padding: 3rem; color: #8a8275; }
    .empty-icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(61,53,41,0.4);
      z-index: 100; display: none; align-items: center; justify-content: center;
      padding: 2rem;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #ffffff; border-radius: 16px; padding: 2rem;
      max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(139,115,85,0.15);
      border: 1px solid rgba(139,115,85,0.08);
    }
    .modal-close {
      float: right; background: none; border: none; color: #8a8275;
      font-size: 1.5rem; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: #3d3529; }
    .modal h3 { font-size: 1.1rem; margin-bottom: 1rem; }
    .detail-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 0.6rem 0; border-bottom: 1px solid rgba(139,115,85,0.08);
      gap: 1rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-q { font-size: 0.85rem; color: #8a8275; flex-shrink: 0; max-width: 200px; }
    .detail-a { font-size: 0.85rem; text-align: right; }

    .toast {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      background: #8fae8b; color: #fff; padding: 0.7rem 1.5rem;
      border-radius: 12px; font-size: 0.9rem; font-weight: 600;
      z-index: 200; opacity: 0; transition: all 0.3s; pointer-events: none;
      box-shadow: 0 4px 16px rgba(143,174,139,0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 <span>问卷数据</span>后台</h1>
      <div class="header-actions">
        <button class="btn btn-export" onclick="exportAll()">📥 导出全部 .md</button>
        <button class="btn" onclick="loadAll()">🔄 刷新</button>
      </div>
    </div>

    <div class="stats-row" id="statsRow"></div>
    <div class="dist-section" id="distSection"></div>
    <div class="table-section" id="tableSection"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalContent"></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const PAGE_SIZE = 20;
let currentPage = 1;
let totalPages = 1;

const Q_LABELS = {
  reaction: '看到"稳赚不赔"的反应',
  app_count: '钱有关的 App 数量',
  social: '朋友聊投资时的表现',
  loss_reaction: '基金跌 5% 的反应',
  rank: '投资段位自评',
  midnight_reaction: '半夜刷到利好的反应',
  assistant_style: '理想理财助手',
  animal: '投资动物形象',
  insider_reaction: '亏 30% 时收到内幕消息',
  best_quality: '身边投资大佬的优点',
  features: '最想要的功能',
  ai_dream: 'AI 的一件事',
  biggest_fear: '最怕的投资情况',
  association: '"理财"联想到什么',
  double_reaction: '收益翻倍后第一件事',
  willing_to_pay: '愿意为工具花多少钱',
};

const OPTION_MAP = {
  reaction: ['看到就想找 bug','先搜博主来头','先买 1000 试试','问朋友意见'],
  social: ['疯狂记笔记','心里盘算靠不靠谱','大方分享','低头吃菜'],
  loss_reaction: ['立刻卖掉','跌 10% 再考虑','无所谓','加仓！'],
  rank: ['青铜','白银','黄金','钻石'],
  midnight_reaction: ['设闹钟明早冲','截图明天研究','看评论区','划走不看'],
  assistant_style: ['老司机给答案','教练管住手','百科全书有问必答','隐形管家全自动'],
  animal: ['🦅 老鹰','🐙 章鱼','🐢 乌龟','🐒 猴子'],
  insider_reaction: ['信了加仓','半信半疑查一查','不信止损','已经麻了'],
  best_quality: ['信息灵通','心态好','爱学习','果断'],
  biggest_fear: ['买完就跌','踩雷暴雷','别人赚我不涨','术语看不懂'],
  double_reaction: ['请朋友吃饭','全部取出','继续投','发朋友圈'],
  willing_to_pay: ['0 元','9.9 元/月','29.9 元/月','先试试再说'],
  features: ['AI 体检报告','谣言粉碎机','产业链透视镜','自动交易日记','随身金融词典','研究笔记本'],
};

const TYPE_COLORS = {
  '佛系躺平型': '#8fae8b',
  '知识焦虑型': '#7a8fa0',
  '追涨杀跌型': '#c17f59',
  '理性研究型': '#8b7355',
  '社交跟风型': '#9482a8',
};

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── resolve answer display ──
function resolveAnswer(key, val) {
  if (Array.isArray(val)) {
    const opts = OPTION_MAP[key];
    return val.map(v => opts ? opts[v] : v).join('、');
  }
  if (typeof val === 'number' && OPTION_MAP[key]) {
    return OPTION_MAP[key][val] || String(val);
  }
  return String(val);
}

// ── load stats ──
async function loadStats() {
  try {
    const data = await (await fetch('/api/stats')).json();
    const total = data.total;

    const topEmoji = data.distribution.length > 0 ? data.distribution[0].personality.emoji : '-';
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">总提交数</div></div>
      <div class="stat-card"><div class="stat-num">${data.distribution.length}</div><div class="stat-label">人格类型数</div></div>
      <div class="stat-card"><div class="stat-num">${topEmoji}</div><div class="stat-label">最多类型</div></div>
    `;

    const maxCount = Math.max(...data.distribution.map(d => d.count), 1);
    let barsHtml = '<h2>📈 人格分布</h2>';
    if (total === 0) {
      barsHtml += '<div style="color:#8a8275;text-align:center;padding:1rem">暂无数据</div>';
    } else {
      data.distribution.forEach(d => {
        const p = d.personality;
        const color = TYPE_COLORS[p.name] || '#8b7355';
        const pct = (d.count / maxCount * 100);
        barsHtml += `
          <div class="dist-bar-row">
            <div class="dist-emoji">${p.emoji}</div>
            <div class="dist-name">${p.name}</div>
            <div class="dist-bar-bg">
              <div class="dist-bar-fill" style="width:${pct}%;background:${color}">${d.count}</div>
            </div>
            <div class="dist-count">${Math.round(d.count/total*100)}%</div>
          </div>`;
      });
    }
    document.getElementById('distSection').innerHTML = barsHtml;
  } catch (e) {
    console.error('loadStats error:', e);
    document.getElementById('statsRow').innerHTML = '<div style="color:#c17f59">加载统计失败：' + e.message + '</div>';
  }
}

// ── load list ──
async function loadList(page) {
  if (page) currentPage = page;
  try {
    const data = await (await fetch(`/api/surveys?page=${currentPage}&size=${PAGE_SIZE}`)).json();
    totalPages = data.pages || 1;

    const section = document.getElementById('tableSection');
    if (data.items.length === 0) {
      section.innerHTML = `
        <h2>📋 提交记录</h2>
        <div class="empty"><div class="empty-icon">📭</div>还没有人提交过问卷</div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    let rows = '';
    data.items.forEach((item, i) => {
      const p = item.personality;
      const color = TYPE_COLORS[p.name] || '#8b7355';
      const time = item.created_at.replace('T', ' ').slice(0, 16);
      rows += `
        <tr>
          <td>${(currentPage-1)*PAGE_SIZE + i + 1}</td>
          <td><span class="type-badge" style="background:${color}22;color:${color}">${p.emoji} ${p.name}</span></td>
          <td class="time-cell">${time}</td>
          <td><a class="link-btn" href="/r/${item.id}" target="_blank">查看结果</a></td>
          <td><a class="link-btn" href="#" onclick="showDetail('${item.id}');return false">详细答案</a></td>
        </tr>`;
    });

    section.innerHTML = `
      <h2>📋 提交记录（${data.total} 条）</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>人格类型</th><th>时间</th><th>结果页</th><th>答案</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;

    let pagHtml = '';
    if (totalPages > 1) {
      pagHtml += `<button class="page-btn" onclick="loadList(${currentPage-1})" ${currentPage<=1?'disabled':''}>← 上一页</button>`;
      for (let p = 1; p <= totalPages; p++) {
        pagHtml += `<button class="page-btn ${p===currentPage?'active':''}" onclick="loadList(${p})">${p}</button>`;
      }
      pagHtml += `<button class="page-btn" onclick="loadList(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>下一页 →</button>`;
    }
    document.getElementById('pagination').innerHTML = pagHtml;

  } catch (e) {
    console.error('loadList error:', e);
    document.getElementById('tableSection').innerHTML = '<h2>📋 提交记录</h2><div style="color:#c17f59">加载失败：' + e.message + '</div>';
  }
}

// ── detail modal ──
async function showDetail(id) {
  try {
    const data = await (await fetch(`/api/survey/${id}`)).json();
    const p = data.personality;
    const color = TYPE_COLORS[p.name] || '#8b7355';

    let html = `
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h3>${p.emoji} ${p.name} · <span style="color:#8a8275;font-size:0.85rem">${data.created_at}</span></h3>
    `;
    for (const [key, val] of Object.entries(data.answers)) {
      html += `<div class="detail-row"><div class="detail-q">${Q_LABELS[key]||key}</div><div class="detail-a">${resolveAnswer(key, val)}</div></div>`;
    }
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modal').classList.add('show');
  } catch (e) {
    alert('加载详情失败：' + e.message);
  }
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

// ── export all to .md ──
async function exportAll() {
  toast('正在生成 Markdown…');
  try {
    const fullData = await (await fetch('/api/surveys/all')).json();

    if (fullData.length === 0) {
      toast('没有数据可导出');
      return;
    }

    // build markdown
    let md = `# 「你是哪种投资人？」问卷数据导出\n\n`;
    md += `> 导出时间：${new Date().toLocaleString('zh-CN')}\n`;
    md += `> 总提交数：${fullData.length}\n\n`;

    // summary table
    md += `## 人格分布\n\n`;
    md += `| 人格类型 | 数量 | 占比 |\n|---|---|---|\n`;
    const counts = {};
    fullData.forEach(d => { const n = d.personality.name; counts[n] = (counts[n]||0) + 1; });
    Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([name, count]) => {
      const emoji = fullData.find(d => d.personality.name === name).personality.emoji;
      md += `| ${emoji} ${name} | ${count} | ${(count/fullData.length*100).toFixed(1)}% |\n`;
    });

    // each submission
    md += `\n---\n\n## 全部回答明细\n\n`;
    fullData.forEach((d, i) => {
      const p = d.personality;
      md += `### #${i+1} ${p.emoji} ${p.name}\n\n`;
      md += `- **提交时间**：${d.created_at}\n`;
      md += `- **结果链接**：${location.origin}/r/${d.id}\n`;
      for (const [key, val] of Object.entries(d.answers)) {
        md += `- **${Q_LABELS[key]||key}**：${resolveAnswer(key, val)}\n`;
      }
      md += `\n`;
    });

    // download
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `survey-export-${new Date().toISOString().slice(0,10)}.md`;
    a.click();
    URL.revokeObjectURL(url);
    toast(`已导出 ${fullData.length} 条记录`);
  } catch (e) {
    console.error('export error:', e);
    toast('导出失败：' + e.message);
  }
}

// ── init ──
async function loadAll() {
  await Promise.all([loadStats(), loadList()]);
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
loadAll();
</script>
</body>
</html>
